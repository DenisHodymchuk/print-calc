services:
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: printuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: print_calc
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printuser -d print_calc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
